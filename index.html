<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCR Vision - Text Extractor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg1: #0f172a;
        --bg2: #1e293b;
        --glass: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.18);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #7c3aed;
        --accent2: #06b6d4;
        --success: #22c55e;
        --danger: #ef4444;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      body {
        font-family: Inter, Arial, sans-serif;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(124, 58, 237, 0.35),
            transparent 30%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(6, 182, 212, 0.25),
            transparent 30%
          ),
          linear-gradient(135deg, var(--bg1), var(--bg2));
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 18px;
        overflow-x: hidden;
      }

      .bg-blur {
        position: fixed;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.45;
        z-index: 0;
        animation: float 8s ease-in-out infinite;
      }

      .blur1 {
        top: 40px;
        left: 40px;
        background: #7c3aed;
      }

      .blur2 {
        bottom: 50px;
        right: 60px;
        background: #06b6d4;
        animation-delay: 2s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) scale(1);
        }
        50% {
          transform: translateY(-16px) scale(1.05);
        }
      }

      .app {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1120px;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 28px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .brand h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 0.3px;
      }

      .brand p {
        color: var(--muted);
        margin-top: 8px;
        font-size: 0.98rem;
      }

      .badge {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #e2e8f0;
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px;
      }

      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        padding: 22px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .card h2 {
        font-size: 1.1rem;
        margin-bottom: 14px;
      }

      .upload-box {
        border: 1.5px dashed rgba(255, 255, 255, 0.25);
        border-radius: 22px;
        padding: 26px;
        min-height: 260px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        gap: 16px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04),
          rgba(255, 255, 255, 0.02)
        );
        transition: 0.3s ease;
      }

      .upload-box:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.4);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      }

      .upload-icon {
        width: 74px;
        height: 74px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        font-size: 2rem;
        background: linear-gradient(
          135deg,
          rgba(124, 58, 237, 0.35),
          rgba(6, 182, 212, 0.35)
        );
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.18);
      }

      .upload-box p {
        color: var(--muted);
        line-height: 1.5;
      }

      input[type="file"] {
        display: none;
      }

      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .btn {
        border: none;
        outline: none;
        cursor: pointer;
        color: white;
        font-weight: 700;
        padding: 12px 18px;
        border-radius: 14px;
        transition: 0.25s ease;
        font-size: 0.95rem;
        letter-spacing: 0.2px;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #06b6d4);
      }

      .btn-secondary {
        background: linear-gradient(135deg, #334155, #475569);
      }

      .btn-success {
        background: linear-gradient(135deg, #16a34a, #22c55e);
      }

      .btn-danger {
        background: linear-gradient(135deg, #dc2626, #ef4444);
      }

      .preview-wrap {
        min-height: 260px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 16px;
      }

      #previewImage {
        max-width: 100%;
        max-height: 400px;
        border-radius: 16px;
        display: none;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 20px;
      }

      .status {
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
        margin-top: 12px;
        min-height: 46px;
        display: flex;
        align-items: center;
      }

      textarea {
        width: 100%;
        min-height: 240px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        outline: none;
        resize: vertical;
        border-radius: 18px;
        padding: 18px;
        background: rgba(15, 23, 42, 0.55);
        color: white;
        font-size: 0.96rem;
        line-height: 1.6;
      }

      textarea::placeholder {
        color: #94a3b8;
      }

      .stats {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .chip {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e2e8f0;
        font-size: 0.9rem;
      }

      .glow {
        position: relative;
        overflow: hidden;
      }

      .glow::after {
        content: "";
        position: absolute;
        top: -120%;
        left: -30%;
        width: 60%;
        height: 300%;
        background: linear-gradient(
          to right,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        transform: rotate(25deg);
        transition: 0.6s;
      }

      .glow:hover::after {
        left: 120%;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .brand h1 {
          font-size: 1.6rem;
        }

        .app {
          padding: 18px;
        }
      }

      .feedback-btn {
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
        transition: 0.25s ease;
      }

      .feedback-btn:hover {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <div class="app">
      <div class="topbar">
        <div class="brand">
          <h1>SnapText</h1>
          <p>
            Upload an image and extract all visible text in a sleek interface.
          </p>
        </div>
        <a
          class="badge feedback-btn"
          href="mailto:azaruddin1307@gmail.com?subject=Feedback%20for%20OCR%20Vision&body=Hi%2C%20I%20want%20to%20share%20feedback%20about%20the%20SnapText."
        >
          Feedback
        </a>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Upload Image</h2>
          <label class="upload-box" for="imageInput">
            <div class="upload-icon">🖼️</div>
            <h3>Choose or Drop Image</h3>
            <p>
              Supports screenshots, scanned docs, notes, posters, and photos
              with text.
            </p>
          </label>

          <input type="file" id="imageInput" accept="image/*" />

          <div class="btn-row">
            <button class="btn btn-primary glow" id="extractBtn">
              ✨ Extract Text
            </button>
            <button class="btn btn-secondary glow" id="changeBtn">
              📂 Choose Image
            </button>
            <button class="btn btn-danger glow" id="clearBtn">🗑 Clear</button>
          </div>

          <div class="status" id="status">Waiting for image upload...</div>

          <div class="stats">
            <div class="chip" id="fileNameChip">No file selected</div>
            <div class="chip" id="charCountChip">Characters: 0</div>
          </div>
        </div>

        <div class="card">
          <h2>Preview</h2>
          <div class="preview-wrap">
            <div class="empty" id="emptyPreview">
              Your uploaded image will appear here.
            </div>
            <img id="previewImage" alt="Preview" />
          </div>
        </div>
      </div>

      <div class="card" style="margin-top: 22px">
        <h2>Extracted Text</h2>
        <textarea
          id="outputText"
          placeholder="Recognized text will appear here..."
        ></textarea>

        <div class="btn-row">
          <button class="btn btn-success glow" id="copyBtn">
            📋 Copy Text
          </button>
          <button class="btn btn-secondary glow" id="downloadBtn">
            ⬇ Download TXT
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script>
      const imageInput = document.getElementById("imageInput");
      const previewImage = document.getElementById("previewImage");
      const emptyPreview = document.getElementById("emptyPreview");
      const extractBtn = document.getElementById("extractBtn");
      const changeBtn = document.getElementById("changeBtn");
      const clearBtn = document.getElementById("clearBtn");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const outputText = document.getElementById("outputText");
      const statusBox = document.getElementById("status");
      const fileNameChip = document.getElementById("fileNameChip");
      const charCountChip = document.getElementById("charCountChip");

      let selectedFile = null;

      changeBtn.addEventListener("click", () => imageInput.click());

      imageInput.addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;

        selectedFile = file;
        fileNameChip.textContent = file.name;

        const reader = new FileReader();
        reader.onload = function (e) {
          previewImage.src = e.target.result;
          previewImage.style.display = "block";
          emptyPreview.style.display = "none";
        };
        reader.readAsDataURL(file);

        outputText.value = "";
        charCountChip.textContent = "Characters: 0";
        statusBox.textContent = "Image loaded. Ready to extract text.";
      });

      extractBtn.addEventListener("click", async () => {
        if (!selectedFile) {
          alert("Please upload an image first.");
          return;
        }

        extractBtn.disabled = true;
        statusBox.textContent = "Starting OCR...";

        try {
          const result = await Tesseract.recognize(selectedFile, "eng", {
            logger: (m) => {
              if (m.status === "recognizing text") {
                statusBox.textContent = `Recognizing text... ${Math.round(m.progress * 100)}%`;
              } else {
                statusBox.textContent = `${m.status}...`;
              }
            },
          });

          const text = result.data.text.trim();
          outputText.value = text;
          charCountChip.textContent = `Characters: ${text.length}`;
          statusBox.textContent = "Text extraction completed successfully.";
        } catch (error) {
          console.error(error);
          statusBox.textContent = "Text extraction failed.";
          alert("Something went wrong during OCR.");
        } finally {
          extractBtn.disabled = false;
        }
      });

      copyBtn.addEventListener("click", async () => {
        const text = outputText.value.trim();
        if (!text) {
          alert("No text to copy.");
          return;
        }

        await navigator.clipboard.writeText(text);
        statusBox.textContent = "Extracted text copied to clipboard.";
      });

      downloadBtn.addEventListener("click", () => {
        const text = outputText.value.trim();
        if (!text) {
          alert("No text to download.");
          return;
        }

        const blob = new Blob([text], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "extracted-text.txt";
        a.click();
        URL.revokeObjectURL(a.href);
        statusBox.textContent = "Text file downloaded.";
      });

      clearBtn.addEventListener("click", () => {
        selectedFile = null;
        imageInput.value = "";
        previewImage.src = "";
        previewImage.style.display = "none";
        emptyPreview.style.display = "block";
        outputText.value = "";
        fileNameChip.textContent = "No file selected";
        charCountChip.textContent = "Characters: 0";
        statusBox.textContent = "Waiting for image upload...";
      });
    </script>
  </body>
</html>
